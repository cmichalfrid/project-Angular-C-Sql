<main class="main-content">
  <h2>Welcome to Game Zone</h2>
  <p>Discover the latest and greatest games!</p>
  <div class="game-grid">
    <div class="game-card" *ngFor="let game of games">
      <img [src]="game.image" [alt]="game.title">
      <h3>{{ game.title }}</h3>
      <p>{{ game.description }}</p>
    </div>
  </div>
</main>
